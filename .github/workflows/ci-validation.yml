name: CI Validation

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  detect-changes:
    name: Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      generators: ${{ steps.changes.outputs.generators }}
      analyzers: ${{ steps.changes.outputs.analyzers }}
      runtime: ${{ steps.changes.outputs.runtime }}
      common: ${{ steps.changes.outputs.common }}
      cli: ${{ steps.changes.outputs.cli }}
      any-change: ${{ steps.changes.outputs.any-change }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect Changed Files
        id: changes
        run: |
          # Get changed files
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi
          
          CHANGED_FILES=$(git diff --name-only $BASE..$HEAD)
          
          # Check which projects changed
          echo "generators=$(echo "$CHANGED_FILES" | grep -q "Source~/DangFugBixs.Generators~" && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "analyzers=$(echo "$CHANGED_FILES" | grep -q "Source~/DangFugBixs.Analyzers~" && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "runtime=$(echo "$CHANGED_FILES" | grep -q "Source~/DangFugBixs.Runtime~" && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "common=$(echo "$CHANGED_FILES" | grep -q "Source~/DangFugBixs.Common~" && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "cli=$(echo "$CHANGED_FILES" | grep -q "Source~/DangFugBixs.Tools~" && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "any-change=true" >> $GITHUB_OUTPUT
          
          echo "Changed files:"
          echo "$CHANGED_FILES"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: detect-changes
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-
      
      - name: Restore Dependencies
        run: dotnet restore Source~/NhemDangFugBixs.Tooling.sln
      
      # Build only if any project changed
      - name: Build Solution
        if: needs.detect-changes.outputs.any-change == 'true'
        run: |
          # Build incrementally - only changed projects trigger rebuild
          dotnet build Source~/NhemDangFugBixs.Tooling.sln \
            -c Release \
            --no-restore \
            /p:UseRoslynSourceGenerator=true
      
      # Test only affected assemblies
      - name: Run Tests - Generators
        if: needs.detect-changes.outputs.generators == 'true'
        run: |
          dotnet test Source~/DangFugBixs.Generators~/DangFugBixs.Generators.Tests/DangFugBixs.Generators.Tests.csproj \
            -c Release --no-build --logger "console;verbosity=minimal"
      
      - name: Run Tests - Analyzers
        if: needs.detect-changes.outputs.analyzers == 'true'
        run: |
          dotnet test Source~/DangFugBixs.Analyzers~/DangFugBixs.Analyzers.Tests/DangFugBixs.Analyzers.Tests.csproj \
            -c Release --no-build --logger "console;verbosity=minimal"
      
      - name: Run Tests - All (if runtime/common changed)
        if: |
          needs.detect-changes.outputs.runtime == 'true' ||
          needs.detect-changes.outputs.common == 'true'
        run: |
          dotnet test Source~/NhemDangFugBixs.Tooling.sln \
            -c Release --no-build --logger "console;verbosity=minimal"
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/*.trx
            **/TestResults/*.xml
          retention-days: 7

  validate-cli:
    name: Validate CLI Tool
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-test]
    if: needs.detect-changes.outputs.cli == 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Pack CLI
        run: |
          mkdir -p nupkg
          dotnet pack Source~/DangFugBixs.Tools~/DangFugBixs.Cli/DangFugBixs.Cli.csproj -c Release -o nupkg
      
      - name: Install CLI Locally
        run: dotnet tool install --add-source nupkg DangFugBixs.Cli --tool-path ./tools
      
      - name: Test CLI Help
        run: ./tools/dotnet-di-smoke --help
      
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: cli-package
          path: nupkg/*.nupkg
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Check Format
        run: dotnet format Source~/NhemDangFugBixs.Tooling.sln --verify-no-changes || echo "Format issues found"
      
      - name: Build Analyzers
        run: dotnet build Source~/DangFugBixs.Analyzers~/DangFugBixs.Analyzers/DangFugBixs.Analyzers.csproj

