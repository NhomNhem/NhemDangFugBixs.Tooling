name: CI Validation

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore Dependencies
        run: dotnet restore Source~/NhemDangFugBixs.Tooling.sln
      
      - name: Build Solution
        run: dotnet build Source~/NhemDangFugBixs.Tooling.sln -c Release --no-restore
      
      - name: Run Tests
        run: dotnet test Source~/NhemDangFugBixs.Tooling.sln -c Release --no-build --logger "console;verbosity=minimal"
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/*.trx
            **/TestResults/*.xml
          retention-days: 7

  validate-cli:
    name: Validate CLI Tool
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Pack CLI
        run: |
          mkdir -p nupkg
          dotnet pack Source~/DangFugBixs.Tools~/DangFugBixs.Cli/DangFugBixs.Cli.csproj -c Release -o nupkg
      
      - name: Install CLI Locally
        run: dotnet tool install --add-source nupkg DangFugBixs.Cli --tool-path ./tools
      
      - name: Test CLI Help
        run: ./tools/dotnet-di-smoke --help
      
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: cli-package
          path: nupkg/*.nupkg
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Check Format
        run: dotnet format Source~/NhemDangFugBixs.Tooling.sln --verify-no-changes || echo "Format issues found"
      
      - name: Build Analyzers
        run: dotnet build Source~/DangFugBixs.Analyzers~/DangFugBixs.Analyzers/DangFugBixs.Analyzers.csproj
