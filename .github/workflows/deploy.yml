name: Deploy Unity Package

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build runtime and tooling artifacts
        run: |
          dotnet build Source~/DangFugBixs.Runtime~/DangFugBixs.Runtime.csproj -c Release
          dotnet build Source~/DangFugBixs.Analyzers~/DangFugBixs.Analyzers.csproj -c Release
          dotnet build Source~/DangFugBixs.Generators~/DangFugBixs.Generators.csproj -c Release

      - name: Determine package version
        id: version
        run: |
          VERSION=$(python -c "import json, pathlib; data = json.load(open(\"package.json\")); print(data.get(\"version\", \"unknown\"))")
          echo "Determined version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy/Runtime deploy/Analyzers deploy/Editor
          cp -r Runtime deploy/Runtime
          cp Source~/DangFugBixs.Analyzers~/DangFugBixs.Analyzers/bin/Release/netstandard2.0/*.dll deploy/Analyzers/
          cp Source~/DangFugBixs.Generators~/DangFugBixs.Generators/bin/Release/netstandard2.0/*.dll deploy/Analyzers/
          cp Runtime/NhemDangFugBixs.Runtime.dll deploy/Analyzers/
          cp Runtime/NhemDangFugBixs.Runtime.dll.meta deploy/Analyzers/
          python - <<'PY'
          import json

          with open('package.json', 'r', encoding='utf-8') as fp:
              data = json.load(fp)

          data.pop('dependencies', None)

          with open('deploy/package.json', 'w', encoding='utf-8') as fp:
              json.dump(data, fp, indent=2)
              fp.write('\n')
          PY
          cp README.md deploy/README.md
          # Include Unity meta files for tracked Unity assets
          cp Runtime.meta deploy/Runtime.meta
          cp Analyzers.meta deploy/Analyzers.meta
          cp Editor.meta deploy/Editor.meta
          cp package.json.meta deploy/package.json.meta
          cp README.md.meta deploy/README.md.meta
      # Do NOT copy website/ or docs/ into deploy branch

      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: deploy
          force_orphan: true
