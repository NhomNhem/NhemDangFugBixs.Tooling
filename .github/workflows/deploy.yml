name: Deploy Unity Package

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (optional)
        run: |
          dotnet build || true

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir deploy
          cp -r Runtime deploy/Runtime
          cp -r Analyzers deploy/Analyzers
          cp -r Editor deploy/Editor
          python - <<'PY'
          import json

          with open('package.json', 'r', encoding='utf-8') as fp:
              data = json.load(fp)

          data.pop('dependencies', None)

          with open('deploy/package.json', 'w', encoding='utf-8') as fp:
              json.dump(data, fp, indent=2)
              fp.write('\n')
          PY
          cp README.md deploy/README.md
          # Include Unity meta files for tracked Unity assets
          cp Runtime.meta deploy/Runtime.meta
          cp Analyzers.meta deploy/Analyzers.meta
          cp Editor.meta deploy/Editor.meta
          cp package.json.meta deploy/package.json.meta
          cp README.md.meta deploy/README.md.meta
      # Do NOT copy website/ or docs/ into deploy branch

      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: deploy
          force_orphan: true
