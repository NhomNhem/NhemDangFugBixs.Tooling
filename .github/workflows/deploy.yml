name: Deploy Unity Package

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (optional)
        run: |
          dotnet build || true

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir deploy
          cp -r Runtime deploy/
          cp -r Analyzers deploy/
          cp -r Editor deploy/
          cp package.json deploy/
          cp README.md deploy/
          cp CHANGELOG.md deploy/
# Do NOT copy website/ or docs/ into deploy branch

      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: deploy
          force_orphan: true
