name: Deploy Unity Package

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build runtime and tooling artifacts
        run: |
          dotnet build Source~/DangFugBixs.Runtime~/DangFugBixs.Runtime.csproj -c Release
          dotnet build Source~/DangFugBixs.Analyzers~/DangFugBixs.Analyzers/DangFugBixs.Analyzers.csproj -c Release
          dotnet build Source~/DangFugBixs.Generators~/DangFugBixs.Generators/DangFugBixs.Generators.csproj -c Release

      - name: Determine package version
        id: version
        run: |
          VERSION=$(python -c "import json, pathlib; data = json.load(open(\"package.json\")); print(data.get(\"version\", \"unknown\"))")
          echo "Determined version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy/Runtime deploy/Analyzers deploy/Editor
          cp Runtime/* deploy/Runtime/
          cp Source~/DangFugBixs.Analyzers~/DangFugBixs.Analyzers/bin/Release/netstandard2.0/*.dll deploy/Analyzers/
          cp Source~/DangFugBixs.Generators~/DangFugBixs.Generators/bin/Release/netstandard2.0/*.dll deploy/Analyzers/
          rm -f deploy/Analyzers/NhemDangFugBixs.Runtime.dll
          rm -f deploy/Analyzers/NhemDangFugBixs.Runtime.pdb
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          def stable_guid(name: str) -> str:
              digest = hashlib.md5(name.encode('utf-8')).hexdigest()
              return f"{digest[:8]}{digest[8:12]}{digest[12:16]}{digest[16:20]}{digest[20:32]}"

          analyzer_meta = """fileFormatVersion: 2
          labels:
          - RoslynAnalyzer
          PluginImporter:
            serializedVersion: 2
            iconMap: {}
            executionOrder: {}
            defineConstraints: []
            isPreloaded: 0
            isAutoReferenced: 0
            validateReferences: 0
            platformData:
            - first:
                Any:
              second:
                enabled: 0
            - first:
                Editor:
              second:
                enabled: 0
            - first:
                Win64:
              second:
                enabled: 0
            - first:
                OSXUniversal:
              second:
                enabled: 0
            - first:
                Linux64:
              second:
                enabled: 0
            - first:
                Android:
              second:
                enabled: 0
            - first:
                iOS:
              second:
                enabled: 0
            - first:
                WebGL:
              second:
                enabled: 0
            userData:
            assetBundleName:
            assetBundleVariant:
          """

          dependency_meta = """fileFormatVersion: 2
          labels: []
          PluginImporter:
            serializedVersion: 2
            iconMap: {}
            executionOrder: {}
            defineConstraints: []
            isPreloaded: 0
            isAutoReferenced: 0
            validateReferences: 0
            platformData:
            - first:
                Any:
              second:
                enabled: 0
            - first:
                Editor:
              second:
                enabled: 0
            userData:
            assetBundleName:
            assetBundleVariant:
          """

          with open('package.json', 'r', encoding='utf-8') as fp:
              data = json.load(fp)

          data.pop('dependencies', None)

          with open('deploy/package.json', 'w', encoding='utf-8') as fp:
              json.dump(data, fp, indent=2)
              fp.write('\n')

          analyzers_dir = Path('deploy/Analyzers')
          analyzer_names = {
              'NhemDangFugBixs.Analyzers.dll',
              'NhemDangFugBixs.Generators.dll',
          }
          for dll_path in analyzers_dir.glob('*.dll'):
              meta_path = dll_path.with_suffix(dll_path.suffix + '.meta')
              if meta_path.exists():
                  continue
              template = analyzer_meta if dll_path.name in analyzer_names else dependency_meta
              meta_path.write_text(
                  template.replace('fileFormatVersion: 2', f"fileFormatVersion: 2\nguid: {stable_guid(dll_path.name)}", 1),
                  encoding='utf-8'
              )
          PY
          cp README.md deploy/README.md
          # Include Unity meta files for tracked Unity assets
          cp Runtime.meta deploy/Runtime.meta
          cp Analyzers.meta deploy/Analyzers.meta
          cp Editor.meta deploy/Editor.meta
          cp package.json.meta deploy/package.json.meta
          cp README.md.meta deploy/README.md.meta
      # Do NOT copy website/ or docs/ into deploy branch

      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: deploy
          force_orphan: true
