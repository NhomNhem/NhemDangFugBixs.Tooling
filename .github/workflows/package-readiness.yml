name: Package Readiness

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master, main ]

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate package manifest and assets
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          data = json.load(open("package.json", encoding="utf-8"))

          required_keys = {"name", "version", "displayName", "description", "unity", "license"}
          missing = sorted(required_keys - data.keys())
          if missing:
              raise SystemExit(f"package.json missing required keys: {missing}")

          banned_keys = {"main", "scripts", "directories", "bugs", "homepage"}
          found_banned = sorted(banned_keys & data.keys())
          if found_banned:
              raise SystemExit(f"package.json still contains npm-only keys: {found_banned}")

          version = data["version"]
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"package version is not semver: {version}")

          files = data.get("files", [])
          expected_files = {
              "Runtime",
              "Editor",
              "Analyzers",
              "package.json",
              "README.md",
              "CHANGELOG.md",
              "LICENSE",
          }
          if not expected_files.issubset(set(files)):
              raise SystemExit("package.json files whitelist does not include all required package artifacts")

          required_paths = [
              "LICENSE",
              "CHANGELOG.md",
              "README.md",
              "Runtime/Attributes/NhemDangFugBixs.Attributes.dll",
              "Runtime/NhemDangFugBixs.Runtime.dll",
              "Editor/NhemDangFugBixs.Editor.asmdef",
              "Editor/SceneInjectedProcessor.cs",
              "Analyzers/NhemDangFugBixs.Analyzers.dll",
              "Analyzers/NhemDangFugBixs.Generators.dll",
          ]
          missing_paths = [path for path in required_paths if not Path(path).exists()]
          if missing_paths:
              raise SystemExit(f"missing package assets: {missing_paths}")

          print("Package manifest and assets validated.")
          PY

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(python -c "import json; print(json.load(open('package.json', encoding='utf-8'))['version'])")
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [ "v$PACKAGE_VERSION" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi
