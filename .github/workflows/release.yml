name: Release CI

on:
  push:
    branches:
      - main
      - 'release/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Validate manifest version format
        run: |
          python - <<'PY'
          import json
          import re

          version = json.load(open("package.json", encoding="utf-8"))["version"]
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"package.json version is not semver: {version}")
          print(f"Validated package version: {version}")
          PY

  release-readiness:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release prerequisites
        run: |
          test -f LICENSE
          test -f CHANGELOG.md
          test -f package.json
          test -f Runtime/NhemDangFugBixs.Runtime.dll
          test -f Runtime/Attributes/NhemDangFugBixs.Attributes.dll
          test -f Runtime/NhemDangFugBixs.Runtime.Package.asmdef
          test -f Runtime/Attributes/NhemDangFugBixs.Attributes.Package.asmdef
          test -f Editor/NhemDangFugBixs.Editor.asmdef
          test -f Analyzers/NhemDangFugBixs.Analyzers.dll
          test -f Analyzers/NhemDangFugBixs.Generators.dll
          test -f Analyzers/NhemDangFugBixs.Analyzers.Package.asmdef
