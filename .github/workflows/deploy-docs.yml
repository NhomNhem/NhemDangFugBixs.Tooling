name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: website/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('website/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          set -e
          # Prefer clean, reproducible install; fall back to npm install if lockfile mismatches
          npm ci || npm install --no-audit --no-fund
        working-directory: website

      - name: Build Docusaurus site
        run: npm run build
        working-directory: website

      - name: Verify build output
        run: |
          if [ ! -d website/build ]; then echo "Build output missing"; exit 1; fi

      # Do NOT copy pkg files to docs branch

      - name: Remove sensitive files (if any)
        run: |
          rm -rf website/build/ai*
          rm -rf website/build/AI*
          rm -rf website/build/*huongdan*
          rm -rf website/build/*guide*
          rm -rf website/build/.agent
          rm -rf website/build/openspec
        shell: bash
        working-directory: .

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build
          publish_branch: gh-pages
          force_orphan: true
          keep_files: false
